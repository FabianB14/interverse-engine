name: Deploy demo to GitHub Pages

# Builds games/hello and publishes it so it can be opened on any phone via a URL.
# Deploys only from the default branch (main): GitHub Pages' environment
# protection rejects deploys from other branches, and running on feature
# branches would just produce failing runs and cancel the real deploy.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; newer pushes cancel in-flight ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Assemble site (hub + demos)
        run: |
          mkdir -p dist-site
          cp site/index.html dist-site/index.html
          cp -r games/hello/dist dist-site/blob-tap
          cp -r games/room/dist dist-site/room
          cp -r games/taps/dist dist-site/taps
          cp -r games/blobvale/dist dist-site/blobvale
          cp -r games/farm/dist dist-site/farm

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist-site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
